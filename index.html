<!DOCTYPE html>
<html>
<head>
    <title>Pi Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
</head>
<body>
    <h1>Raspberry Pi Status</h1>
    <div id="data">Warte auf Datden...</div>

    <script>
        const client = new Paho.MQTT.Client("192.168.178.144", 9001, "web_client_" + Math.random());

        client.onMessageArrived = function(message) {
            // JSON parsen, das dein C++ Programm sendet
            const data = JSON.parse(message.payloadString);

            // Auf der Seite anzeigen
            document.getElementById("data").innerHTML = `
                <p>CPU Temp: ${data.cpu_temp} °C</p>
                <p>RAM Free: ${data.ram.available} KB</p>
                <p>WLAN Signal: ${data.wlan.signal} dBm</p>
            `;
        };

        client.connect({onSuccess: () => {
            console.log("Verbunden!");
            client.subscribe("telemetry");
        }});
    </script>
</body>
</html>
